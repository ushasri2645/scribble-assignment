name: Pre-Evaluation Check

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  pre-evaluation:
    name: AI Pre-Evaluation Evidence
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        if: hashFiles('backend/package-lock.json') != ''
        working-directory: backend
        continue-on-error: true
        run: npm ci

      - name: Install frontend dependencies
        if: hashFiles('frontend/package-lock.json') != ''
        working-directory: frontend
        continue-on-error: true
        run: npm ci

      - name: Run pre-evaluation check
        id: precheck
        run: |
          set +e
          node .github/scripts/pre-evaluation-check.mjs
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish precheck to workflow summary
        run: cat precheck-results/ai-precheck-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload AI precheck reports
        uses: actions/upload-artifact@v4
        with:
          name: ai-precheck-report
          path: |
            precheck-results/ai-precheck-report.md
            precheck-results/ai-precheck-report.json

      - name: Comment precheck report on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- ai-precheck-report -->';
            const reportPath = 'precheck-results/ai-precheck-report.md';
            const report = fs.readFileSync(reportPath, 'utf8');
            const maxLength = 60000;
            const body = `${marker}\n${report.length > maxLength
              ? `${report.slice(0, maxLength)}\n\n_Report truncated. Download the full ai-precheck-report artifact for complete details._`
              : report}`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.data.find((comment) =>
              comment.user.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Fail on hard precheck blockers
        if: steps.precheck.outputs.exit_code != '0'
        run: |
          echo "Pre-evaluation found hard blockers. See ai-precheck-report artifact or PR comment."
          exit 1
